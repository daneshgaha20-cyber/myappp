# Drought Stress RF Analyzer

An Android application built with **Kivy** for analyzing stress levels in various indices such as POD, SOD, CAT, etc.

## 🚀 Features
- **Single Analysis**: Analyze a specific index with multiple replicates.
- **Group Analysis**: Analyze multiple indices simultaneously and get a comparative summary.
- **Automated Calculation**: Calculates averages and finds the closest stress level to the control group.

## 🛠️ Technologies Used
- **Language:** Python
- **Framework:** Kivy
- **Build Tool:** Buildozer (for Android APK generation)

